name: Quality Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest pytest-cov bandit

    - name: Lint with Pylint
      run: |
        pylint --rcfile=.pylintrc --fail-under=7.0 src/

    - name: Security scan with Bandit
      run: |
        bandit -r src/ -ll -f json -o bandit-report.json || true

    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=src --cov-report=html --cov-report=term --cov-fail-under=70

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json
